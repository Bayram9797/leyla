<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8 March - Leyla</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    overflow-x: hidden;
    background: linear-gradient(160deg, #0d1b2a, #1b2838, #16425b, #2d6a4f, #1b4332);
    background-size: 500% 500%;
    animation: bgFlow 20s ease infinite;
    font-family: Arial, Helvetica, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  @keyframes bgFlow {
    0%   { background-position: 0% 0%; }
    25%  { background-position: 100% 50%; }
    50%  { background-position: 50% 100%; }
    75%  { background-position: 0% 50%; }
    100% { background-position: 0% 0%; }
  }

  /* ===== СИЯНИЕ — БЕЗ blur ===== */
  .aurora {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .aurora-band {
    position: absolute;
    width: 200%;
    height: 40%;
    border-radius: 50%;
    opacity: 0.1;
    animation: auroraDrift 12s ease-in-out infinite alternate;
  }

  .aurora-band:nth-child(1) {
    top: -10%; left: -50%;
    background: radial-gradient(ellipse, rgba(0,245,212,0.3), transparent 70%);
    animation-duration: 12s;
  }

  .aurora-band:nth-child(2) {
    top: 10%; left: -30%;
    background: radial-gradient(ellipse, rgba(155,93,229,0.25), transparent 70%);
    animation-duration: 9s;
    animation-delay: 2s;
  }

  @keyframes auroraDrift {
    0%   { transform: translateX(0); }
    100% { transform: translateX(25%); }
  }

  /* ===== СВЕТЛЯЧКИ ===== */
  .firefly {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    will-change: transform, opacity;
    animation: fireflyGlow ease-in-out infinite;
  }

  @keyframes fireflyGlow {
    0%, 100% { opacity: 0; transform: translateY(0) scale(0.5); }
    30%      { opacity: 1; transform: translateY(-25px) scale(1); }
    70%      { opacity: 0.5; transform: translateY(-45px) scale(0.8); }
  }

  /* ===== МЫЛЬНЫЕ ПУЗЫРИ ===== */
  .bubble {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 2;
    border: 1px solid rgba(255,255,255,0.2);
    background: radial-gradient(circle at 30% 30%,
      rgba(255,255,255,0.1),
      rgba(150,200,255,0.03),
      transparent 70%);
    will-change: transform, opacity;
    animation: bubbleRise ease-in forwards;
  }

  @keyframes bubbleRise {
    0%   { transform: translateY(0) scale(0.3); opacity: 0; }
    10%  { opacity: 0.6; transform: scale(1); }
    100% { transform: translateY(-85vh) translateX(20px) scale(0.7); opacity: 0; }
  }

  /* ===== ФОНАРИКИ ===== */
  .lantern {
    position: fixed;
    bottom: -80px;
    pointer-events: none;
    z-index: 2;
    will-change: transform, opacity;
    animation: lanternFloat ease-in forwards;
  }

  .lantern-body {
    width: 36px;
    height: 45px;
    background: radial-gradient(circle, rgba(255,200,50,0.85), rgba(255,150,30,0.6));
    border-radius: 50% 50% 45% 45%;
    position: relative;
  }

  .lantern-body::before {
    content: '';
    position: absolute;
    top: -5px;
    left: 50%;
    transform: translateX(-50%);
    width: 16px;
    height: 7px;
    border: 2px solid rgba(255,200,100,0.5);
    border-bottom: none;
    border-radius: 50% 50% 0 0;
  }

  @keyframes lanternFloat {
    0%   { transform: translateY(0); opacity: 0; }
    5%   { opacity: 0.8; }
    100% { transform: translateY(-115vh) translateX(15px); opacity: 0; }
  }

  /* ===== КЛИК ===== */
  .click-spark {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    will-change: transform, opacity;
    animation: sparkBurst 0.8s ease-out forwards;
  }

  @keyframes sparkBurst {
    0%   { transform: scale(0); opacity: 1; }
    50%  { transform: scale(1.3); opacity: 0.7; }
    100% { transform: scale(0.2) translateY(-80px); opacity: 0; }
  }

  /* ===== КОНТЕЙНЕР ===== */
  .container {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 20px;
    max-width: 620px;
    width: 92%;
  }

  /* ===== ЗОЛОТАЯ 8 ===== */
  .gold-eight {
    margin-bottom: 10px;
    animation: eightDrop 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  .gold-eight svg {
    width: 100px;
    height: 160px;
  }

  .gold-eight svg text {
    fill: none;
    stroke: url(#goldGrad);
    stroke-width: 2;
    stroke-dasharray: 500;
    stroke-dashoffset: 500;
    animation: drawEight 3s ease-out 0.5s forwards;
    font-size: 140px;
    font-weight: bold;
  }

  @keyframes drawEight {
    0%   { stroke-dashoffset: 500; }
    100% { stroke-dashoffset: 0; }
  }

  @keyframes eightDrop {
    0%   { opacity: 0; transform: scale(0.3) rotate(-20deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  .march-sub {
    font-size: 20px;
    color: rgba(255,200,100,0.8);
    letter-spacing: 10px;
    margin-bottom: 35px;
    animation: fadeSlideUp 1s ease-out 0.8s both;
  }

  /* ===== КАРТОЧКА — БЕЗ backdrop-filter ===== */
  .card {
    background: rgba(15, 30, 50, 0.85);
    border-radius: 24px;
    padding: 50px 38px;
    animation: cardReveal 1.3s ease-out 1s both;
    position: relative;
    border: 1px solid rgba(255,200,100,0.2);
  }

  .corner {
    position: absolute;
    width: 40px;
    height: 40px;
    border-color: rgba(255,200,100,0.5);
    border-style: solid;
    border-width: 0;
    animation: cornerAppear 0.8s ease-out 2s both;
  }

  .corner-tl { top: 12px; left: 12px; border-top-width: 2px; border-left-width: 2px; border-radius: 4px 0 0 0; }
  .corner-tr { top: 12px; right: 12px; border-top-width: 2px; border-right-width: 2px; border-radius: 0 4px 0 0; }
  .corner-bl { bottom: 12px; left: 12px; border-bottom-width: 2px; border-left-width: 2px; border-radius: 0 0 0 4px; }
  .corner-br { bottom: 12px; right: 12px; border-bottom-width: 2px; border-right-width: 2px; border-radius: 0 0 4px 0; }

  @keyframes cornerAppear {
    0%   { opacity: 0; transform: scale(0); }
    100% { opacity: 1; transform: scale(1); }
  }

  @keyframes cardReveal {
    0%   { opacity: 0; transform: translateY(40px) scale(0.95); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  .greeting {
    font-size: 15px;
    color: rgba(255,200,100,0.7);
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-bottom: 12px;
    animation: fadeSlideUp 1s ease-out 1.5s both;
  }

  .sis-name {
    font-size: 50px;
    font-weight: bold;
    color: #fff;
    margin-bottom: 8px;
    animation: nameShine 1.2s ease-out 1.8s both;
    position: relative;
    display: inline-block;
  }

  .sis-name::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,200,100,0.8), transparent);
    animation: underlineGrow 1.5s ease-out 2.5s forwards;
  }

  @keyframes underlineGrow {
    0%   { width: 0; left: 50%; }
    100% { width: 100%; left: 0; }
  }

  @keyframes nameShine {
    0%   { opacity: 0; transform: scale(0.5); }
    60%  { transform: scale(1.06); }
    100% { opacity: 1; transform: scale(1); }
  }

  .sis-label {
    font-size: 16px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 25px;
    animation: fadeSlideUp 1s ease-out 2.1s both;
  }

  .gold-line {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,200,100,0.6), transparent);
    margin: 0 auto 25px;
    animation: fadeSlideUp 1s ease-out 2.3s both;
  }

  .msg {
    font-size: 17px;
    line-height: 2;
    color: rgba(255,255,255,0.85);
    margin-bottom: 30px;
    animation: fadeSlideUp 1s ease-out 2.5s both;
  }

  .flower-row {
    font-size: 28px;
    margin-bottom: 30px;
    animation: fadeSlideUp 1s ease-out 2.8s both;
  }

  .flower-row span {
    display: inline-block;
    margin: 0 6px;
    animation: floatFlower 3s ease-in-out infinite;
  }

  .flower-row span:nth-child(1) { animation-delay: 0s; }
  .flower-row span:nth-child(2) { animation-delay: 0.3s; }
  .flower-row span:nth-child(3) { animation-delay: 0.6s; }
  .flower-row span:nth-child(4) { animation-delay: 0.9s; }
  .flower-row span:nth-child(5) { animation-delay: 1.2s; }

  @keyframes floatFlower {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }

  .from-text {
    font-size: 14px;
    color: rgba(255,200,100,0.6);
    margin-bottom: 6px;
    animation: fadeSlideUp 1s ease-out 3.1s both;
  }

  .from-name {
    font-size: 28px;
    font-weight: bold;
    color: rgba(255,200,100,0.9);
    animation: fadeSlideUp 1s ease-out 3.4s both;
  }

  .heart-anim {
    font-size: 40px;
    margin-top: 18px;
    display: inline-block;
    animation: heartGlow 1.5s ease-in-out infinite, fadeSlideUp 1s ease-out 3.7s both;
  }

  @keyframes heartGlow {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.2); }
  }

  .magic-btn {
    margin-top: 35px;
    padding: 14px 45px;
    font-size: 17px;
    border: 1px solid rgba(255,200,100,0.5);
    background: rgba(255,200,100,0.1);
    color: rgba(255,200,100,0.9);
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s;
    animation: fadeSlideUp 1s ease-out 4s both;
    font-family: Arial, Helvetica, sans-serif;
  }

  .magic-btn:hover {
    border-color: rgba(255,200,100,0.8);
    color: #fff;
    background: rgba(255,200,100,0.2);
    transform: translateY(-2px);
  }

  .magic-btn:active { transform: scale(0.95); }

  @keyframes fadeSlideUp {
    0%   { opacity: 0; transform: translateY(25px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* ===== ЗОЛОТОЙ ДОЖДЬ ===== */
  .gold-rain {
    position: fixed;
    top: -20px;
    pointer-events: none;
    z-index: 998;
    width: 2px;
    border-radius: 2px;
    will-change: transform, opacity;
    animation: rainFall linear forwards;
  }

  @keyframes rainFall {
    0%   { transform: translateY(0); opacity: 0.8; }
    100% { transform: translateY(105vh); opacity: 0; }
  }

  .hint {
    position: fixed;
    bottom: 18px;
    color: rgba(255,200,100,0.25);
    font-size: 13px;
    z-index: 10;
    animation: fadeSlideUp 1s ease-out 5s both;
  }

  @media (max-width: 600px) {
    .sis-name { font-size: 36px; }
    .card { padding: 40px 22px; }
    .msg { font-size: 15px; }
    .gold-eight svg { width: 70px; height: 120px; }
    .march-sub { font-size: 16px; letter-spacing: 7px; }
    .flower-row { font-size: 22px; }
    .corner { width: 28px; height: 28px; }
  }
</style>
</head>
<body>

<div class="aurora">
  <div class="aurora-band"></div>
  <div class="aurora-band"></div>
</div>

<div class="container">
  <div class="gold-eight">
    <svg viewBox="0 0 100 160">
      <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#ffd700"/>
          <stop offset="50%" style="stop-color:#ffec8b"/>
          <stop offset="100%" style="stop-color:#daa520"/>
        </linearGradient>
      </defs>
      <text x="50" y="135" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="140" stroke="url(#goldGrad)" fill="none" stroke-width="2">8</text>
    </svg>
  </div>
  <div class="march-sub" id="marchSub"></div>

  <div class="card">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="greeting" id="greetingText"></div>
    <div class="sis-name" id="sisName"></div>
    <div class="sis-label" id="sisLabel"></div>
    <div class="gold-line"></div>
    <div class="msg" id="msgText"></div>
    <div class="flower-row">
      <span>&#10024;</span>
      <span>&#127800;</span>
      <span>&#127804;</span>
      <span>&#127800;</span>
      <span>&#10024;</span>
    </div>
    <div class="from-text" id="fromText"></div>
    <div class="from-name" id="fromName"></div>
    <div class="heart-anim">&#128155;</div>
    <br>
    <button class="magic-btn" id="magicBtn"></button>
  </div>
</div>

<div class="hint" id="hintText"></div>

<script>
  // ===== ТЕКСТЫ =====
  document.getElementById('marchSub').textContent = '\u043C\u0430\u0440\u0442\u0430';
  document.getElementById('greetingText').textContent = '\u0421 \u043F\u0440\u0430\u0437\u0434\u043D\u0438\u043A\u043E\u043C';
  document.getElementById('sisName').textContent = '\u041B\u0435\u0439\u043B\u0430';
  document.getElementById('sisLabel').innerHTML = '\u043B\u044E\u0431\u0438\u043C\u0430\u044F \u0441\u0435\u0441\u0442\u0440\u0430 \u2728';
  document.getElementById('msgText').innerHTML = '\u0422\u044B \u2014 \u043B\u0443\u0447\u0448\u0430\u044F \u0441\u0435\u0441\u0442\u0440\u0430 \u043D\u0430 \u0441\u0432\u0435\u0442\u0435!<br>\u0416\u0435\u043B\u0430\u044E \u0442\u0435\u0431\u0435 \u0441\u0447\u0430\u0441\u0442\u044C\u044F, \u0443\u043B\u044B\u0431\u043E\u043A<br>\u0438 \u0438\u0441\u043F\u043E\u043B\u043D\u0435\u043D\u0438\u044F \u0432\u0441\u0435\u0445 \u043C\u0435\u0447\u0442\u0430\u043D\u0438\u0439!<br><br>\u041F\u0443\u0441\u0442\u044C \u0432\u0435\u0441\u043D\u0430 \u043F\u0440\u0438\u043D\u0435\u0441\u0451\u0442 \u0442\u0435\u0431\u0435<br>\u0442\u043E\u043B\u044C\u043A\u043E \u0440\u0430\u0434\u043E\u0441\u0442\u044C \u0438 \u043B\u044E\u0431\u043E\u0432\u044C!';
  document.getElementById('fromText').textContent = '\u0422\u0432\u043E\u0439 \u0431\u0440\u0430\u0442, \u0441 \u043B\u044E\u0431\u043E\u0432\u044C\u044E';
  document.getElementById('fromName').textContent = '\u0411\u0430\u0439\u0440\u0430\u043C';
  document.getElementById('hintText').innerHTML = '\u043D\u0430\u0436\u0438\u043C\u0430\u0439 \u043D\u0430 \u044D\u043A\u0440\u0430\u043D \u2728';

  var gBtn = document.getElementById('magicBtn');
  gBtn.innerHTML = '\u2728 \u041D\u0430\u0436\u043C\u0438 \u0434\u043B\u044F \u0441\u044E\u0440\u043F\u0440\u0438\u0437\u0430 \u2728';
  gBtn.onclick = magicSurprise;

  // ===== ОГРАНИЧИТЕЛЬ ЭЛЕМЕНТОВ =====
  var MAX_ELEMENTS = 25;
  var activeElements = [];

  function addElement(el, lifetime) {
    document.body.appendChild(el);
    activeElements.push(el);
    setTimeout(function(){
      el.remove();
      var idx = activeElements.indexOf(el);
      if (idx > -1) activeElements.splice(idx, 1);
    }, lifetime);

    // Удаляем старые если слишком много
    while (activeElements.length > MAX_ELEMENTS) {
      var old = activeElements.shift();
      old.remove();
    }
  }

  // ===== СВЕТЛЯЧКИ (15 вместо 40) =====
  for (var i = 0; i < 15; i++) {
    var ff = document.createElement('div');
    ff.className = 'firefly';
    ff.style.left = Math.random() * 100 + '%';
    ff.style.top = (20 + Math.random() * 70) + '%';
    var size = 3 + Math.random() * 4;
    ff.style.width = size + 'px';
    ff.style.height = size + 'px';
    var hue = 40 + Math.random() * 20;
    ff.style.background = 'hsla(' + hue + ', 100%, 70%, 0.8)';
    ff.style.animationDuration = (5 + Math.random() * 5) + 's';
    ff.style.animationDelay = Math.random() * 6 + 's';
    document.body.appendChild(ff);
  }

  // ===== ПУЗЫРИ (реже) =====
  function createBubble() {
    if (activeElements.length > MAX_ELEMENTS) return;
    var b = document.createElement('div');
    b.className = 'bubble';
    var size = 20 + Math.random() * 40;
    b.style.width = size + 'px';
    b.style.height = size + 'px';
    b.style.left = Math.random() * 100 + '%';
    b.style.bottom = '-50px';
    b.style.animationDuration = (8 + Math.random() * 6) + 's';
    addElement(b, 15000);
  }
  setInterval(createBubble, 3000);

  // ===== ФОНАРИКИ (реже) =====
  function createLantern() {
    if (activeElements.length > MAX_ELEMENTS) return;
    var l = document.createElement('div');
    l.className = 'lantern';
    var body = document.createElement('div');
    body.className = 'lantern-body';
    var s = 0.6 + Math.random() * 0.5;
    l.style.transform = 'scale(' + s + ')';
    l.style.left = (10 + Math.random() * 80) + '%';
    l.style.animationDuration = (12 + Math.random() * 8) + 's';
    l.appendChild(body);
    addElement(l, 21000);
  }
  setInterval(createLantern, 5000);
  setTimeout(createLantern, 1000);

  // ===== КЛИК (3 вместо 5) =====
  document.addEventListener('click', function(e) {
    var emojis = ['\u2728','\uD83D\uDC9B','\u2B50','\uD83C\uDF38','\uD83C\uDF3C','\uD83D\uDCAB'];
    for (var i = 0; i < 3; i++) {
      var el = document.createElement('div');
      el.className = 'click-spark';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = (e.clientX - 10 + (Math.random()-0.5)*50) + 'px';
      el.style.top = (e.clientY - 10 + (Math.random()-0.5)*50) + 'px';
      el.style.fontSize = (20 + Math.random()*16) + 'px';
      document.body.appendChild(el);
      (function(elem){ setTimeout(function(){ elem.remove(); }, 800); })(el);
    }
  });

  // ===== ЗОЛОТОЙ ДОЖДЬ =====
  function createGoldRain() {
    var r = document.createElement('div');
    r.className = 'gold-rain';
    r.style.left = Math.random() * 100 + '%';
    r.style.height = (12 + Math.random() * 20) + 'px';
    r.style.background = 'linear-gradient(to bottom, rgba(255,200,50,0.7), transparent)';
    r.style.animationDuration = (1.2 + Math.random() * 1) + 's';
    addElement(r, 2500);
  }

  // ===== СЮРПРИЗ =====
  var clickN = 0;
  var msgs = [
    '\uD83D\uDC9B \u0422\u044B \u0441\u0430\u043C\u0430\u044F \u043B\u0443\u0447\u0448\u0430\u044F! \uD83D\uDC9B',
    '\u2728 \u041B\u044E\u0431\u043B\u044E \u0442\u0435\u0431\u044F, \u0441\u0435\u0441\u0442\u0440\u0430! \u2728',
    '\uD83C\uDF1F \u0422\u044B \u043C\u043E\u044F \u0433\u043E\u0440\u0434\u043E\u0441\u0442\u044C! \uD83C\uDF1F',
    '\uD83C\uDF38 \u0421\u0447\u0430\u0441\u0442\u044C\u044F \u0442\u0435\u0431\u0435! \uD83C\uDF38'
  ];

  function magicSurprise() {
    gBtn.innerHTML = msgs[clickN % msgs.length];
    clickN++;

    // Золотой дождь (30 вместо 50)
    for (var i = 0; i < 30; i++) {
      (function(idx){
        setTimeout(createGoldRain, idx * 80);
      })(i);
    }

    // Пузыри (8 вместо 15)
    for (var j = 0; j < 8; j++) {
      (function(idx){ setTimeout(createBubble, idx * 150); })(j);
    }

    // Фонарики (3 вместо 6)
    for (var k = 0; k < 3; k++) {
      (function(idx){ setTimeout(createLantern, idx * 400); })(k);
    }

    // Эмодзи-взрыв (12 вместо 24)
    var cx = window.innerWidth / 2;
    var cy = window.innerHeight / 2;
    var burst = ['\u2728','\uD83D\uDC9B','\uD83C\uDF1F','\uD83C\uDF38','\u2B50','\uD83C\uDF3C'];
    for (var m = 0; m < 12; m++) {
      (function(idx){
        var em = document.createElement('div');
        em.textContent = burst[Math.floor(Math.random() * burst.length)];
        em.style.position = 'fixed';
        em.style.left = cx + 'px';
        em.style.top = cy + 'px';
        em.style.fontSize = (22 + Math.random()*14) + 'px';
        em.style.pointerEvents = 'none';
        em.style.zIndex = '997';
        document.body.appendChild(em);

        var angle = (Math.PI * 2 * idx) / 12;
        var dist = 80 + Math.random() * 120;
        var tx = Math.cos(angle) * dist;
        var ty = Math.sin(angle) * dist;

        em.animate([
          { transform: 'translate(-50%,-50%) scale(0)', opacity: 1 },
          { transform: 'translate(calc(-50% + '+tx+'px), calc(-50% + '+ty+'px)) scale(1.2)', opacity: 0 }
        ], { duration: 1000 + Math.random()*400, easing: 'ease-out', fill: 'forwards' });

        setTimeout(function(){ em.remove(); }, 1500);
      })(m);
    }

    setTimeout(function(){
      gBtn.innerHTML = '\u2728 \u0415\u0449\u0451 \u0440\u0430\u0437! \u2728';
    }, 3000);
  }
</script>
</body>
